<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>myMoE</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #f4f0e8;
        --muted: #aaa49a;
        --line: #2f3541;
        --accent: #6ee7b7;
        --error: #fb7185;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100svh;
        background:
          radial-gradient(circle at 10% 10%, rgba(110, 231, 183, 0.09), transparent 28rem),
          linear-gradient(135deg, #0f1115 0%, #131722 48%, #191510 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button, textarea { font: inherit; }

      .shell {
        display: grid;
        grid-template-columns: 18rem minmax(0, 1fr) 23rem;
        min-height: 100svh;
      }

      aside, main, .inspector { padding: 1.2rem; }

      aside {
        border-right: 1px solid var(--line);
        background: rgba(15, 17, 21, 0.72);
      }

      .brand {
        margin: 0 0 1.6rem;
        font-size: 2.15rem;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .status {
        display: grid;
        gap: 0.7rem;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .status strong {
        display: block;
        color: var(--text);
        font-weight: 650;
        margin-bottom: 0.2rem;
      }

      .samples {
        display: grid;
        gap: 0.5rem;
        margin-top: 1.6rem;
      }

      .sample {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--text);
        border-radius: 0.45rem;
        padding: 0.68rem 0.75rem;
        text-align: left;
        cursor: pointer;
        transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
      }

      .sample:hover {
        background: rgba(255, 255, 255, 0.045);
        border-color: rgba(110, 231, 183, 0.55);
        transform: translateY(-1px);
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(17rem, 1fr) auto;
        gap: 1rem;
      }

      .topline {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid var(--line);
        padding-bottom: 1rem;
      }

      .topline h2, .inspector h2 {
        margin: 0;
        font-size: 0.95rem;
        color: var(--muted);
        font-weight: 560;
      }

      .metric-row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .metric-row span { color: var(--text); }

      .answer {
        white-space: pre-wrap;
        overflow: auto;
        border-bottom: 1px solid var(--line);
        padding: 1rem 0 1.4rem;
        line-height: 1.55;
      }

      .answer.empty { color: var(--muted); }

      .composer {
        display: grid;
        gap: 0.75rem;
      }

      textarea {
        width: 100%;
        min-height: 8rem;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        padding: 0.9rem;
        line-height: 1.45;
        outline: none;
      }

      textarea:focus { border-color: rgba(110, 231, 183, 0.7); }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .primary, .secondary {
        border: 1px solid transparent;
        border-radius: 0.45rem;
        padding: 0.68rem 0.9rem;
        cursor: pointer;
        transition: opacity 140ms ease, transform 140ms ease;
      }

      .primary {
        background: var(--accent);
        color: #06110c;
        font-weight: 700;
      }

      .secondary {
        background: transparent;
        color: var(--muted);
        border-color: var(--line);
      }

      .primary:hover, .secondary:hover { transform: translateY(-1px); }

      .primary:disabled, .secondary:disabled {
        opacity: 0.52;
        cursor: wait;
        transform: none;
      }

      .inspector {
        border-left: 1px solid var(--line);
        background: rgba(15, 17, 21, 0.58);
        overflow: auto;
      }

      .block {
        border-top: 1px solid var(--line);
        padding: 1rem 0;
      }

      .block:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .kv {
        display: grid;
        gap: 0.45rem;
        font-size: 0.86rem;
      }

      .kv div {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        color: var(--muted);
      }

      .kv span {
        color: var(--text);
        text-align: right;
      }

      .route-list, .expert-list {
        display: grid;
        gap: 0.55rem;
        margin-top: 0.9rem;
      }

      .route-item, .expert-item {
        border: 1px solid var(--line);
        border-radius: 0.45rem;
        padding: 0.65rem;
        background: rgba(255, 255, 255, 0.025);
      }

      .route-item strong, .expert-item strong {
        display: block;
        font-size: 0.9rem;
      }

      .route-item small, .expert-item small {
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .error { color: var(--error); }

      @media (max-width: 980px) {
        .shell { grid-template-columns: 1fr; }
        aside, .inspector {
          border: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside>
        <h1 class="brand">myMoE</h1>
        <div class="status" id="status"></div>
        <div class="samples">
          <button class="sample" data-prompt="Analyze the tradeoff between a single local general model and a routed MoE for a private desktop assistant.">Architecture tradeoff</button>
          <button class="sample" data-prompt="Summarize this product idea into a concise plan with risks, MVP scope, and test strategy.">Product planning</button>
          <button class="sample" data-prompt="Rewrite this message in Italian, keeping it direct and warm.">Writing task</button>
          <button class="sample" data-prompt="Design a memory policy for a local assistant that must remember user preferences without polluting active context.">Memory policy</button>
        </div>
      </aside>

      <main>
        <section class="topline">
          <h2>Workspace</h2>
          <div class="metric-row">
            <div>Latency <span id="latency">-</span></div>
            <div>Route <span id="route">-</span></div>
            <div>Mode <span id="mode">mock</span></div>
          </div>
        </section>

        <section class="answer empty" id="answer">Run a prompt to inspect routing, provider output, fallback errors, and evaluation behavior.</section>

        <section class="composer">
          <textarea id="prompt" placeholder="Ask the local MoE something..."></textarea>
          <div class="actions">
            <button class="secondary" id="eval">Run Eval</button>
            <button class="primary" id="send">Generate</button>
          </div>
        </section>
      </main>

      <section class="inspector">
        <h2>Inspector</h2>
        <div class="block"><div class="kv" id="config"></div></div>
        <div class="block">
          <h2>Selected Route</h2>
          <div class="route-list" id="routes"></div>
        </div>
        <div class="block">
          <h2>Experts</h2>
          <div class="expert-list" id="experts"></div>
        </div>
      </section>
    </div>

    <script>
      const el = (id) => document.getElementById(id);

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.message || payload.error || "Request failed");
        return payload;
      }

      function renderConfig(payload) {
        el("mode").textContent = payload.experts.some((expert) => expert.provider !== "mock") ? "live" : "mock";
        el("status").innerHTML = `
          <div><strong>Config</strong>${payload.config_path}</div>
          <div><strong>Aggregation</strong>${payload.routing.aggregation}, top-${payload.routing.top_k}</div>
          <div><strong>Fallback</strong>${payload.routing.fallback_order.join(", ") || "none"}</div>
        `;
        el("config").innerHTML = `
          <div>Experts <span>${payload.experts.length}</span></div>
          <div>Rules <span>${payload.rules.length}</span></div>
          <div>Providers <span>${providerMix(payload.experts)}</span></div>
        `;
        el("experts").innerHTML = payload.experts.map((expert) => `
          <div class="expert-item">
            <strong>${expert.id}</strong>
            <small>${expert.role} / ${expert.model}</small>
          </div>
        `).join("");
      }

      function providerMix(experts) {
        return [...new Set(experts.map((expert) => expert.provider))].join(", ");
      }

      function renderRoutes(items) {
        el("routes").innerHTML = items.map((item) => `
          <div class="route-item">
            <strong>${item.expert_id}</strong>
            <small>score ${Number(item.score).toFixed(2)} / ${item.matched_keywords.join(", ") || "no keyword"}</small>
          </div>
        `).join("");
        el("route").textContent = items[0] ? items[0].expert_id : "-";
      }

      async function generate() {
        const prompt = el("prompt").value.trim();
        if (!prompt) return;

        setBusy(true);
        const started = performance.now();
        el("answer").classList.remove("empty", "error");
        el("answer").textContent = "Generating...";
        try {
          const payload = await api("/api/generate", {
            method: "POST",
            body: JSON.stringify({ prompt }),
          });
          el("answer").textContent = payload.content;
          el("latency").textContent = `${Math.round(performance.now() - started)} ms`;
          renderRoutes(payload.route.selected);
        } catch (error) {
          el("answer").classList.add("error");
          el("answer").textContent = error.message;
        } finally {
          setBusy(false);
        }
      }

      async function runEval() {
        setBusy(true);
        el("answer").classList.remove("empty", "error");
        el("answer").textContent = "Running eval...";
        try {
          const payload = await api("/api/evaluate", {
            method: "POST",
            body: JSON.stringify({ eval_path: "experiments/eval_set_extended.jsonl" }),
          });
          el("answer").textContent = JSON.stringify({
            accuracy: payload.accuracy,
            total: payload.total,
            by_complexity: payload.by_complexity,
          }, null, 2);
          el("latency").textContent = "-";
        } catch (error) {
          el("answer").classList.add("error");
          el("answer").textContent = error.message;
        } finally {
          setBusy(false);
        }
      }

      function setBusy(value) {
        el("send").disabled = value;
        el("eval").disabled = value;
      }

      document.querySelectorAll(".sample").forEach((button) => {
        button.addEventListener("click", () => {
          el("prompt").value = button.dataset.prompt;
          el("prompt").focus();
        });
      });

      el("send").addEventListener("click", generate);
      el("eval").addEventListener("click", runEval);
      el("prompt").addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") generate();
      });

      api("/api/config").then(renderConfig).catch((error) => {
        el("answer").classList.add("error");
        el("answer").textContent = error.message;
      });
    </script>
  </body>
</html>
