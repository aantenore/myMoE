<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>myMoE</title>
    <style>
      :root {
        color-scheme: dark;
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 10% 3.9%;
        --card-foreground: 0 0% 98%;
        --popover: 240 10% 3.9%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 3.7% 15.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%;
        --accent: 240 3.7% 15.9%;
        --accent-foreground: 0 0% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 240 4.9% 83.9%;
        --radius: 0.625rem;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      textarea {
        font: inherit;
      }

      .app {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .topbar {
        height: 4rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid hsl(var(--border));
        padding: 0 1.25rem;
        background: hsl(var(--background) / 0.96);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .logo {
        display: grid;
        place-items: center;
        width: 2rem;
        height: 2rem;
        border: 1px solid hsl(var(--border));
        border-radius: calc(var(--radius) - 2px);
        background: hsl(var(--secondary));
        color: hsl(var(--secondary-foreground));
        font-weight: 700;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1rem;
        font-weight: 650;
      }

      .subtitle {
        color: hsl(var(--muted-foreground));
        font-size: 0.8125rem;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        height: 1.5rem;
        border: 1px solid hsl(var(--border));
        border-radius: 999px;
        padding: 0 0.6rem;
        background: hsl(var(--secondary));
        color: hsl(var(--secondary-foreground));
        font-size: 0.75rem;
        font-weight: 500;
        white-space: nowrap;
      }

      .layout {
        display: grid;
        grid-template-columns: 18rem minmax(0, 1fr) 22rem;
        min-height: 0;
      }

      .sidebar,
      .workspace,
      .inspector {
        min-width: 0;
        padding: 1rem;
      }

      .sidebar {
        border-right: 1px solid hsl(var(--border));
      }

      .inspector {
        border-left: 1px solid hsl(var(--border));
      }

      .workspace {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 1rem;
      }

      .section-title {
        margin-bottom: 0.5rem;
        color: hsl(var(--muted-foreground));
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .card {
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        background: hsl(var(--card));
        color: hsl(var(--card-foreground));
        box-shadow: 0 1px 2px hsl(0 0% 0% / 0.18);
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        border-bottom: 1px solid hsl(var(--border));
        padding: 0.8rem 0.9rem;
      }

      .card-title {
        font-size: 0.875rem;
        font-weight: 600;
      }

      .card-content {
        padding: 0.9rem;
      }

      .stack {
        display: grid;
        gap: 0.75rem;
      }

      .sample {
        width: 100%;
        border: 1px solid hsl(var(--border));
        border-radius: calc(var(--radius) - 2px);
        background: transparent;
        color: hsl(var(--foreground));
        padding: 0.65rem 0.75rem;
        text-align: left;
        cursor: pointer;
        transition: background 140ms ease, border-color 140ms ease;
      }

      .sample:hover {
        background: hsl(var(--accent));
        border-color: hsl(var(--ring) / 0.45);
      }

      .sample span {
        display: block;
        color: hsl(var(--muted-foreground));
        font-size: 0.75rem;
        margin-top: 0.2rem;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .metric {
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        padding: 0.8rem 0.9rem;
      }

      .metric-label {
        color: hsl(var(--muted-foreground));
        font-size: 0.75rem;
      }

      .metric-value {
        margin-top: 0.35rem;
        font-size: 1rem;
        font-weight: 650;
        overflow-wrap: anywhere;
      }

      .answer {
        min-height: 20rem;
        max-height: calc(100svh - 20rem);
        overflow: auto;
        white-space: pre-wrap;
        line-height: 1.55;
        color: hsl(var(--foreground));
      }

      .answer.empty {
        color: hsl(var(--muted-foreground));
      }

      .composer {
        display: grid;
        gap: 0.75rem;
      }

      textarea {
        width: 100%;
        min-height: 8rem;
        resize: vertical;
        border: 1px solid hsl(var(--input));
        border-radius: calc(var(--radius) - 2px);
        background: transparent;
        color: hsl(var(--foreground));
        padding: 0.75rem 0.85rem;
        line-height: 1.45;
        outline: none;
      }

      textarea:focus {
        border-color: hsl(var(--ring));
        box-shadow: 0 0 0 2px hsl(var(--ring) / 0.18);
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        height: 2.35rem;
        border: 1px solid transparent;
        border-radius: calc(var(--radius) - 2px);
        padding: 0 0.9rem;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 500;
        transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease;
      }

      .button-primary {
        background: hsl(var(--primary));
        color: hsl(var(--primary-foreground));
      }

      .button-secondary {
        border-color: hsl(var(--border));
        background: hsl(var(--secondary));
        color: hsl(var(--secondary-foreground));
      }

      .button-ghost {
        border-color: hsl(var(--border));
        background: transparent;
        color: hsl(var(--foreground));
      }

      .button:hover {
        opacity: 0.88;
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      .kv {
        display: grid;
        gap: 0.55rem;
        font-size: 0.8125rem;
      }

      .kv div {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        color: hsl(var(--muted-foreground));
      }

      .kv span {
        color: hsl(var(--foreground));
        text-align: right;
        overflow-wrap: anywhere;
      }

      .list {
        display: grid;
        gap: 0.55rem;
      }

      .list-item {
        border: 1px solid hsl(var(--border));
        border-radius: calc(var(--radius) - 2px);
        padding: 0.65rem;
        background: hsl(var(--secondary) / 0.42);
      }

      .list-item strong {
        display: block;
        font-size: 0.875rem;
      }

      .list-item small {
        color: hsl(var(--muted-foreground));
        overflow-wrap: anywhere;
      }

      .error {
        color: hsl(var(--destructive-foreground));
        background: hsl(var(--destructive) / 0.18);
      }

      @media (max-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar,
        .inspector {
          border: 0;
          border-bottom: 1px solid hsl(var(--border));
        }

        .metrics {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">M</div>
          <div>
            <h1>myMoE</h1>
            <p class="subtitle">Local general-purpose MoE console</p>
          </div>
        </div>
        <div class="top-actions">
          <span class="badge" id="mode">mock</span>
          <span class="badge" id="config-name">configs/moe.mock.json</span>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <div class="section-title">Prompt presets</div>
          <div class="stack">
            <button class="sample" data-prompt="Analyze the tradeoff between a single local general model and a routed MoE for a private desktop assistant.">
              Architecture tradeoff
              <span>General reasoning route</span>
            </button>
            <button class="sample" data-prompt="Summarize this product idea into a concise plan with risks, MVP scope, and test strategy.">
              Product planning
              <span>Summary and planning route</span>
            </button>
            <button class="sample" data-prompt="Rewrite this message in Italian, keeping it direct and warm.">
              Writing task
              <span>Language route</span>
            </button>
            <button class="sample" data-prompt="Design a memory policy for a local assistant that must remember user preferences without polluting active context.">
              Memory policy
              <span>Context and memory route</span>
            </button>
          </div>
        </aside>

        <main class="workspace">
          <section class="metrics">
            <div class="metric">
              <div class="metric-label">Latency</div>
              <div class="metric-value" id="latency">-</div>
            </div>
            <div class="metric">
              <div class="metric-label">Route</div>
              <div class="metric-value" id="route">-</div>
            </div>
            <div class="metric">
              <div class="metric-label">Aggregation</div>
              <div class="metric-value" id="aggregation">-</div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <h2 class="card-title">Response</h2>
              <span class="badge" id="correlation">No run</span>
            </div>
            <div class="card-content">
              <div class="answer empty" id="answer">Run a prompt to inspect routing, provider output, fallback errors, and evaluation behavior.</div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <h2 class="card-title">Composer</h2>
              <span class="badge">Cmd Enter</span>
            </div>
            <div class="card-content composer">
              <textarea id="prompt" placeholder="Ask the local MoE something..."></textarea>
              <div class="actions">
                <button class="button button-secondary" id="eval">Run Eval</button>
                <button class="button button-primary" id="send">Generate</button>
              </div>
            </div>
          </section>
        </main>

        <section class="inspector">
          <div class="stack">
            <section class="card">
              <div class="card-header">
                <h2 class="card-title">Config</h2>
              </div>
              <div class="card-content">
                <div class="kv" id="config"></div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h2 class="card-title">Selected Route</h2>
              </div>
              <div class="card-content">
                <div class="list" id="routes"></div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h2 class="card-title">Experts</h2>
              </div>
              <div class="card-content">
                <div class="list" id="experts"></div>
              </div>
            </section>
          </div>
        </section>
      </div>
    </div>

    <script>
      const el = (id) => document.getElementById(id);

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.message || payload.error || "Request failed");
        return payload;
      }

      function renderConfig(payload) {
        const live = payload.experts.some((expert) => expert.provider !== "mock");
        el("mode").textContent = live ? "live" : "mock";
        el("config-name").textContent = payload.config_path;
        el("aggregation").textContent = `${payload.routing.aggregation} / top-${payload.routing.top_k}`;
        el("config").innerHTML = `
          <div>Experts <span>${payload.experts.length}</span></div>
          <div>Rules <span>${payload.rules.length}</span></div>
          <div>Fallback <span>${payload.routing.fallback_order.join(", ") || "none"}</span></div>
          <div>Providers <span>${providerMix(payload.experts)}</span></div>
        `;
        el("experts").innerHTML = payload.experts.map((expert) => `
          <div class="list-item">
            <strong>${expert.id}</strong>
            <small>${expert.role} / ${expert.model}</small>
          </div>
        `).join("");
      }

      function providerMix(experts) {
        return [...new Set(experts.map((expert) => expert.provider))].join(", ");
      }

      function renderRoutes(items) {
        el("routes").innerHTML = items.map((item) => `
          <div class="list-item">
            <strong>${item.expert_id}</strong>
            <small>score ${Number(item.score).toFixed(2)} / ${item.matched_keywords.join(", ") || "no keyword"}</small>
          </div>
        `).join("");
        el("route").textContent = items[0] ? items[0].expert_id : "-";
      }

      async function generate() {
        const prompt = el("prompt").value.trim();
        if (!prompt) return;

        setBusy(true);
        const started = performance.now();
        el("answer").classList.remove("empty", "error");
        el("answer").textContent = "Generating...";
        try {
          const payload = await api("/api/generate", {
            method: "POST",
            body: JSON.stringify({ prompt }),
          });
          el("answer").textContent = payload.content;
          el("latency").textContent = `${Math.round(performance.now() - started)} ms`;
          el("correlation").textContent = payload.correlation_id.slice(0, 8);
          renderRoutes(payload.route.selected);
        } catch (error) {
          el("answer").classList.add("error");
          el("answer").textContent = error.message;
        } finally {
          setBusy(false);
        }
      }

      async function runEval() {
        setBusy(true);
        el("answer").classList.remove("empty", "error");
        el("answer").textContent = "Running eval...";
        try {
          const payload = await api("/api/evaluate", {
            method: "POST",
            body: JSON.stringify({ eval_path: "experiments/eval_set_extended.jsonl" }),
          });
          el("answer").textContent = JSON.stringify({
            accuracy: payload.accuracy,
            total: payload.total,
            by_complexity: payload.by_complexity,
          }, null, 2);
          el("latency").textContent = "-";
          el("correlation").textContent = "eval";
        } catch (error) {
          el("answer").classList.add("error");
          el("answer").textContent = error.message;
        } finally {
          setBusy(false);
        }
      }

      function setBusy(value) {
        el("send").disabled = value;
        el("eval").disabled = value;
      }

      document.querySelectorAll(".sample").forEach((button) => {
        button.addEventListener("click", () => {
          el("prompt").value = button.dataset.prompt;
          el("prompt").focus();
        });
      });

      el("send").addEventListener("click", generate);
      el("eval").addEventListener("click", runEval);
      el("prompt").addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") generate();
      });

      api("/api/config").then(renderConfig).catch((error) => {
        el("answer").classList.add("error");
        el("answer").textContent = error.message;
      });
    </script>
  </body>
</html>
