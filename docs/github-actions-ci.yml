name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    # Ubuntu 24.04 blocks unprofiled bubblewrap user namespaces via AppArmor.
    runs-on: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu-22.04' || matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Linux verifier sandbox
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Run locked quality gate
        run: >-
          uv run --locked --extra assistant-bridge --extra local-cascade
          python scripts/run_ci_checks.py

  browser-canary:
    name: Browser canary / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu-22.04' || matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pinned Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.15.0"
          package-manager-cache: false

      - name: Prefetch and verify exact browser provider without executing it
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/mymoe-npm-cache
        run: >-
          uv run --locked python -m local_moe.cli browser-prefetch
          --mcp-config configs/mcp.playwright-browser.example.json
          --server browser-local

      - name: Run exact-origin canary with offline provider resolution
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/mymoe-npm-cache
        run: >-
          uv run --locked python -m local_moe.cli
          --app-config configs/app.browser.example.json
          --browser-canary browser-local
          --browser-canary-confirm

  desktop-provider-contract:
    name: Desktop provider contract / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verify locked provider version, catalog, and schema without GUI access
        run: >-
          uv run --locked --extra desktop
          python scripts/check_desktop_provider_contract.py
