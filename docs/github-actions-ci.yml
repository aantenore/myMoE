name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    # Ubuntu 24.04 blocks unprofiled bubblewrap user namespaces via AppArmor.
    runs-on: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu-22.04' || matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Linux verifier sandbox
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Run locked quality gate
        run: uv run --locked --extra assistant-bridge python scripts/run_ci_checks.py
